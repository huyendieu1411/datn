<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://unpkg.com/papaparse@latest/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chrono-node/1.3.11/chrono.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.0/Recharts.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .chart-container { margin-bottom: 40px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // Loading and processing data
    function processData(csvData) {
      const parsed = Papa.parse(csvData, {
        header: true,
        skipEmptyLines: true,
        transform: (value) => value.trim(),
        transformHeader: (header) => header.trim()
      }).data;
      return parsed.map(row => ({
        time: parseFloat(row["Time(S)"]),
        x: parseFloat(row["X"]),
        y: parseFloat(row["Y"]),
        z: parseFloat(row["Z"]),
        action: row["Action"],
        rssi: parseFloat(row["RSSI(dBm)"]),
        packetLoss: parseFloat(row["PacketLoss(%)"])
      })).filter(row => !isNaN(row.time) && !isNaN(row.rssi));
    }

    const noNoiseData = processData(loadFileData("wifi_log.csv"));
    const withNoiseData = processData(loadFileData("wifi_communication_log.csv"));

    // Calculate distance
    function calculateDistance(row) {
      return Math.sqrt(Math.pow(row.x, 2) + Math.pow(row.y, 2) + Math.pow(row.z, 2));
    }

    noNoiseData.forEach(row => row.distance = calculateDistance(row));
    withNoiseData.forEach(row => row.distance = calculateDistance(row));

    // React Component
    const App = () => {
      return (
        <div>
          <div className="chart-container">
            <h2>Line Chart: RSSI and Packet Loss over Time</h2>
            <Recharts.ResponsiveContainer width="100%" height={400}>
              <Recharts.LineChart>
                <Recharts.CartesianGrid strokeDasharray="3 3" />
                <Recharts.XAxis dataKey="time" type="number" label={{ value: "Time (s)", position: "insideBottom", offset: -5 }} style={{ fontSize: 12 }} />
                <Recharts.YAxis yAxisId="rssi" label={{ value: "RSSI (dBm)", angle: -90, position: "insideLeft", offset: 10 }} style={{ fontSize: 12 }} domain={[-60, -40]} />
                <Recharts.YAxis yAxisId="packetLoss" orientation="right" label={{ value: "Packet Loss (%)", angle: 90, position: "insideRight", offset: 10 }} style={{ fontSize: 12 }} domain={[0, 20]} />
                <Recharts.Tooltip />
                <Recharts.Legend />
                <Recharts.Line yAxisId="rssi" data={noNoiseData} dataKey="rssi" name="No Noise RSSI" stroke="#8884d8" dot={false} />
                <Recharts.Line yAxisId="rssi" data={withNoiseData} dataKey="rssi" name="With Noise RSSI" stroke="#82ca9d" dot={false} />
                <Recharts.Line yAxisId="packetLoss" data={noNoiseData} dataKey="packetLoss" name="No Noise Packet Loss" stroke="#ff7300" dot={false} />
                <Recharts.Line yAxisId="packetLoss" data={withNoiseData} dataKey="packetLoss" name="With Noise Packet Loss" stroke="#ff4040" dot={false} />
              </Recharts.LineChart>
            </Recharts.ResponsiveContainer>
          </div>

          <div className="chart-container">
            <h2>Scatter Plot: RSSI and Packet Loss vs Distance</h2>
            <Recharts.ResponsiveContainer width="100%" height={400}>
              <Recharts.ScatterChart>
                <Recharts.CartesianGrid strokeDasharray="3 3" />
                <Recharts.XAxis dataKey="distance" type="number" label={{ value: "Distance (m)", position: "insideBottom", offset: -5 }} style={{ fontSize: 12 }} domain={[0, 70]} />
                <Recharts.YAxis yAxisId="rssi" label={{ value: "RSSI (dBm)", angle: -90, position: "insideLeft", offset: 10 }} style={{ fontSize: 12 }} domain={[-60, -40]} />
                <Recharts.YAxis yAxisId="packetLoss" orientation="right" label={{ value: "Packet Loss (%)", angle: 90, position: "insideRight", offset: 10 }} style={{ fontSize: 12 }} domain={[0, 20]} />
                <Recharts.Tooltip />
                <Recharts.Legend />
                <Recharts.Scatter yAxisId="rssi" data={noNoiseData} fill="#8884d8" name="No Noise RSSI" />
                <Recharts.Scatter yAxisId="rssi" data={withNoiseData} fill="#82ca9d" name="With Noise RSSI" />
                <Recharts.Scatter yAxisId="packetLoss" data={noNoiseData} fill="#ff7300" name="No Noise Packet Loss" />
                <Recharts.Scatter yAxisId="packetLoss" data={withNoiseData} fill="#ff4040" name="With Noise Packet Loss" />
              </Recharts.ScatterChart>
            </Recharts.ResponsiveContainer>
          </div>
        </div>
      );
    };

    // Render React app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
